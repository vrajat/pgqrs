steps:
  - label: ":rust: format"
    key: "format"
    agents:
      queue: "rvpro"
    env:
      BUILDKITE_PLUGIN_FS_CACHE_FOLDER: "/Users/rajatvenkatesh/.local/buildkite-agent/cache"
    plugins:
      - cache#v1.8.1:
          manifest: "Cargo.lock"
          path: "/Users/rajatvenkatesh/.cargo/registry"
          restore: file
          save: file
          key-extra: "cargo-registry"
          soft-fail: true
      - cache#v1.8.1:
          manifest: "Cargo.lock"
          path: "/Users/rajatvenkatesh/.cargo/git"
          restore: file
          save: file
          key-extra: "cargo-git"
          soft-fail: true
      - cache#v1.8.1:
          manifest: "Cargo.lock"
          path: "target"
          restore: file
          save: file
          key-extra: "cargo-target"
          soft-fail: true
      - cache#v1.8.1:
          manifest: ".buildkite/scripts/bootstrap.sh"
          path: "/Users/rajatvenkatesh/.cargo/bin"
          restore: file
          save: file
          key-extra: "cargo-bin"
          soft-fail: true
      - cache#v1.8.1:
          manifest: ".buildkite/scripts/bootstrap.sh"
          path: "/Users/rajatvenkatesh/.local/bin"
          restore: file
          save: file
          key-extra: "local-bin"
          soft-fail: true
    command:
      - ".buildkite/scripts/bootstrap.sh check"
      - "PATH=$HOME/.cargo/bin:$HOME/.local/bin:$PATH UV=uv make check"

