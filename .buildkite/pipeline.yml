steps:
  - label: ":rust: format"
    key: "format"
    agents:
      queue: "rvpro"
    plugins:
      - cache#v1.8.1:
          manifest: "Cargo.lock"
          path: "/Users/rajatvenkatesh/.cargo/registry"
          restore: file
          save: file
          key-extra: "cargo-registry"
          fs-cache-folder: "/Users/rajatvenkatesh/.local/buildkite-agent/cache"
          soft-fail: true
      - cache#v1.8.1:
          manifest: "Cargo.lock"
          path: "/Users/rajatvenkatesh/.cargo/git"
          restore: file
          save: file
          key-extra: "cargo-git"
          fs-cache-folder: "/Users/rajatvenkatesh/.local/buildkite-agent/cache"
          soft-fail: true
      - cache#v1.8.1:
          manifest: "Cargo.lock"
          path: "target"
          restore: file
          save: file
          key-extra: "cargo-target"
          fs-cache-folder: "/Users/rajatvenkatesh/.local/buildkite-agent/cache"
          soft-fail: true
      - cache#v1.8.1:
          manifest: ".buildkite/scripts/bootstrap.sh"
          path: "/Users/rajatvenkatesh/.cargo/bin"
          restore: file
          save: file
          key-extra: "cargo-bin"
          fs-cache-folder: "/Users/rajatvenkatesh/.local/buildkite-agent/cache"
          soft-fail: true
      - cache#v1.8.1:
          manifest: ".buildkite/scripts/bootstrap.sh"
          path: "/Users/rajatvenkatesh/.local/bin"
          restore: file
          save: file
          key-extra: "local-bin"
          fs-cache-folder: "/Users/rajatvenkatesh/.local/buildkite-agent/cache"
          soft-fail: true
    command:
      - ".buildkite/scripts/bootstrap.sh check"
      - "PATH=/Users/rajatvenkatesh/.cargo/bin:/Users/rajatvenkatesh/.local/bin:$PATH UV=/Users/rajatvenkatesh/.local/bin/uv make check"

