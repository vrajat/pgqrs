steps:
  - label: ":rust: format"
    key: "format"
    agents:
      queue: "getafix"
    env:
      BUILDKITE_PLUGIN_FS_CACHE_FOLDER: "/var/lib/buildkite-agent/.local/buildkite-agent/cache"
    plugins:
      - cache#v1.8.1:
          manifest: "Cargo.lock"
          path: "/var/lib/buildkite-agent/.cargo/registry"
          restore: file
          save: file
          key-extra: "cargo-registry"
          soft-fail: true
      - cache#v1.8.1:
          manifest: "Cargo.lock"
          path: "/var/lib/buildkite-agent/.cargo/git"
          restore: file
          save: file
          key-extra: "cargo-git"
          soft-fail: true
      - cache#v1.8.1:
          manifest: "Cargo.lock"
          path: "target"
          restore: file
          save: file
          key-extra: "cargo-target"
          soft-fail: true
      - cache#v1.8.1:
          manifest: "mise.toml"
          path: "/var/lib/buildkite-agent/.local/share/mise"
          restore: file
          save: file
          key-extra: "mise-data"
          soft-fail: true
    command:
      - ".buildkite/scripts/bootstrap.sh check"
      - "mise exec -- make check"

