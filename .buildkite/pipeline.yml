steps:
  - label: ":rust: format"
    key: "format"
    command:
      - ".buildkite/scripts/bootstrap.sh"
      - "cargo fmt --all -- --check"

  - label: ":postgresql: test postgres"
    key: "test-postgres"
    command:
      - ".buildkite/scripts/bootstrap.sh"
      - "trap '.buildkite/scripts/postgres-services.sh stop' EXIT"
      - ".buildkite/scripts/postgres-services.sh start"
      - "CI_POSTGRES_RUNNING=true DATABASE_URL=postgres://postgres:postgres@localhost:5432/postgres PGQRS_TEST_DSN=postgres://postgres:postgres@localhost:5432/postgres PGBOUNCER_TEST_DSN=postgres://postgres@localhost:6432/postgres make test-postgres UV=uv CARGO_FEATURES='--no-default-features --features postgres'"

  - label: ":sqlite: test sqlite"
    key: "test-sqlite"
    command:
      - ".buildkite/scripts/bootstrap.sh"
      - "make test-sqlite UV=uv CARGO_FEATURES='--no-default-features --features sqlite'"

  - label: ":globe_with_meridians: test turso"
    key: "test-turso"
    command:
      - ".buildkite/scripts/bootstrap.sh"
      - "make test-turso UV=uv CARGO_FEATURES='--no-default-features --features turso'"
